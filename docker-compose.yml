services:
  postgres:
    image: postgres:15-alpine
    container_name: mcg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcg
      POSTGRES_PASSWORD: mcg
      POSTGRES_DB: mcg_student_services
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mcg -d mcg_student_services']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mcg-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
